# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
# In production: remove or comment the block below if SSL is terminated
# at the host/load-balancer level (e.g. Cloudflare, host Nginx, Traefik).
server {
    listen 80;
    server_name volta.conectaai.cl;
    return 301 https://$host$request_uri;
}

# ── HTTP (behind host nginx that terminates SSL via Cloudflare) ───────────────
server {
    listen 80 default_server;
    server_name volta.conectaai.cl localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 60M;
    }

    location /uploads/ {
        proxy_pass http://api:8000/uploads/;
        proxy_set_header Host $host;
    }
}
